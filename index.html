<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charibari Comidas Rápidas</title>
  <link rel="stylesheet" href="css/style.css">

</head>

<body>

  <!-- ====== NAV ====== -->
  <nav>
    <!-- Logo a la izquierda -->
    <div class="logo">
      <img src="assets/img/logo-white.png" alt="Logo Comida Rápida">
    </div>

    <!-- Nombre en el centro -->
    <h1 class="brand-name">CHARIBARI</h1>

    <!-- Menú hamburguesa a la derecha -->
    <!-- Usamos el símbolo ☰ como hamburguesa -->
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  </nav>

  <!-- Menú desplegable que ocupa la pantalla -->
  <div class="menu" id="menu">
    <a href="#">Inicio</a>
    <a href="#">Menú</a>
    <a href="#">Promociones</a>
    <a href="#">Contacto</a>
  </div>

  <!-- ====== CONTENIDO ====== -->
  <main>
    <!-- CARRUSEL -->
    <section class="slider">
      <!-- Botones ocultos -->
      <input type="radio" name="slider" id="slide1" checked>
      <input type="radio" name="slider" id="slide2">
      <input type="radio" name="slider" id="slide3">

      <!-- Contenedor de imágenes -->
      <div class="slides">
        <div class="slide"><img src="assets/img/hamburguer.jpg" alt="Hamburguesa 1"></div>
        <div class="slide"><img src="assets/img/hot-dog.jpg" alt="Hamburguesa 2"></div>
        <div class="slide"><img src="assets/img/salchipapas.jpg" alt="Hamburguesa 3"></div>
      </div>

      <!-- Controles (punticos) -->
      <div class="navigation">
        <label for="slide1"></label>
        <label for="slide2"></label>
        <label for="slide3"></label>
      </div>
    </section>

    <!-- MENÚ -->
    <section class="menu-section">
      <h2>Nuestro Menú</h2>
    </section>

    <section class="menu-container">
      <div class="menu-item">
        <img src="assets/img/hamburguer.jpg" alt="Hamburguer">
        <h4>Hamburguesa</h4>
      </div>
      <div class="menu-item"><img src="assets/img/hot-dog.jpg" alt="hot-dog">
        <h4>Hot Dog</h4>
      </div>
      <div class="menu-item"><img src="assets/img/salchipapas.jpg" alt="salchipapas">
        <h4>Salchipapas</h4>
      </div>
      <div class="menu-item">
        <img src="assets/img/sandwich.jpg" alt="SANDWICH">
        <h4>Sandwich</h4>
      </div>
      <div class="menu-item"><img src="assets/img/pizza.jpg" alt="hot-dog">
        <h4>Pizzas</h4>
      </div>
      <div class="menu-item"><img src="assets/img/salchipapas.jpg" alt="salchipapas">
        <h4>Combos</h4>
      </div>
      <div class="menu-item">
        <img src="assets/img/menu-bebidas.png" alt="Hamburguer">
        <h4>Bebidas</h4>
      </div>
      <div class="menu-item"><img src="assets/img/acompañamiento.png" alt="hot-dog">
        <h4>Acompañamientos</h4>
      </div>
      </div>

    </section>

  </main>

  <footer class="footer">

  </footer>

  <!-- ====== SCRIPT SIMPLE PARA MOSTRAR/OCULTAR MENÚ ====== -->
  <script>
    function toggleMenu() {
      // Obtenemos el menú
      const menu = document.getElementById("menu");
      // Si está oculto, lo mostramos. Si está visible, lo ocultamos.
      if (menu.style.display === "block") {
        menu.style.display = "none";
      } else {
        menu.style.display = "block";
      }
    }
  </script>

</body>

</html>
